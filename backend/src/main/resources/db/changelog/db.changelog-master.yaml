databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: ktlin
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: picture_url
                  type: VARCHAR(512)
              - column:
                  name: google_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-refresh-tokens-table
      author: ktlin
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_user
            onDelete: CASCADE

  - changeSet:
      id: 003-create-vocabulary-tables
      author: ktlin
      changes:
        - sqlFile:
            path: db/changelog/003-create-vocabulary-tables.sql
            relativeToChangelogFile: false

  - changeSet:
      id: 003b-create-vocabulary-trigger
      author: ktlin
      changes:
        - sqlFile:
            path: db/changelog/003b-create-vocabulary-trigger.sql
            relativeToChangelogFile: false
            splitStatements: false

  - changeSet:
      id: 004-seed-vocabulary-data
      author: ktlin
      changes:
        - sqlFile:
            path: db/changelog/004-seed-vocabulary-data.sql
            relativeToChangelogFile: false

  - changeSet:
      id: 005-create-quiz-tables
      author: ktlin
      changes:
        - sqlFile:
            path: db/changelog/005-create-quiz-tables.sql
            relativeToChangelogFile: false

  - changeSet:
      id: 006-create-audio-cache-table
      author: ktlin
      changes:
        - sqlFile:
            path: db/changelog/006-create-audio-cache-table.sql
            relativeToChangelogFile: false

  - changeSet:
      id: 007-enhance-audio-tables
      author: ktlin
      changes:
        - sqlFile:
            path: db/changelog/007-enhance-audio-tables.sql
            relativeToChangelogFile: false
