spring.application.name=jlpt-mono

# Datasource
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JWT
app.jwt.secret=${JWT_SECRET}
# 24 hours
app.jwt.expiration-ms=86400000
# 7 days
app.jwt.refresh-expiration-ms=604800000

# Google
app.google.client-id=${GOOGLE_CLIENT_ID}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Docker Compose
spring.docker.compose.file=compose-dev.yaml

# DevTools
spring.devtools.restart.enabled=true

# Backblaze B2 (S3-compatible)
app.storage.b2.endpoint=${B2_S3_ENDPOINT}
app.storage.b2.bucket=${B2_BUCKET}
app.storage.b2.access-key=${B2_ACCESS_KEY}
app.storage.b2.secret-key=${B2_SECRET_KEY}
app.storage.b2.presign-expiration-seconds=${B2_PRESIGN_EXPIRATION_SECONDS:900}

# ElevenLabs TTS
app.tts.elevenlabs.api-key=${ELEVENLABS_API_KEY}
app.tts.elevenlabs.voice-id=EXAVITQu4vr4xnSDxMaL
app.tts.elevenlabs.model-id=eleven_multilingual_v2
app.tts.elevenlabs.base-url=${ELEVENLABS_BASE_URL:https://api.elevenlabs.io}

# Audio Queue
app.audio.queue.dispatch-interval=5s
app.audio.queue.dispatch-batch=5
app.audio.queue.recovery-interval=60s
app.audio.queue.recovery-batch=20
app.audio.queue.startup-recovery-batch=50
app.audio.queue.lease-duration=120s
app.audio.queue.heartbeat-interval=20s
app.audio.queue.worker-concurrency=3
app.audio.queue.max-attempts=5
